<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="100%" height="100%">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#FCD34D" />
    </linearGradient>
    <linearGradient id="greenChat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="3" dy="5" stdDeviation="6" flood-color="#92400E" flood-opacity="0.4"/>
    </filter>
    <filter id="chatShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#059669" flood-opacity="0.35"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background Container -->
  <rect x="10" y="10" width="220" height="220" rx="48"
        fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>

  <!-- Storefront Awning -->
  <path d="M 35 48 h 170 v 22 l -12 12 h -146 l -12 -12 z"
        fill="url(#purpleGrad)" />
  <!-- Awning label -->
  <text x="120" y="64" font-family="Arial Black" font-size="10"
        font-weight="900" fill="#FFFFFF" text-anchor="middle"
        letter-spacing="3">Z SHOP</text>

  <!-- Awning hanging dots — each a different color -->
  <circle cx="50"  cy="84" r="10" fill="#EF4444" />
  <circle cx="78"  cy="84" r="10" fill="#F97316" />
  <circle cx="106" cy="84" r="10" fill="#EAB308" />
  <circle cx="134" cy="84" r="10" fill="#10B981" />
  <circle cx="162" cy="84" r="10" fill="#3B82F6" />
  <circle cx="190" cy="84" r="10" fill="#EC4899" />

  <!-- Dot shine highlights -->
  <circle cx="47"  cy="81" r="3" fill="#FFFFFF" opacity="0.45"/>
  <circle cx="75"  cy="81" r="3" fill="#FFFFFF" opacity="0.45"/>
  <circle cx="103" cy="81" r="3" fill="#FFFFFF" opacity="0.45"/>
  <circle cx="131" cy="81" r="3" fill="#FFFFFF" opacity="0.45"/>
  <circle cx="159" cy="81" r="3" fill="#FFFFFF" opacity="0.45"/>
  <circle cx="187" cy="81" r="3" fill="#FFFFFF" opacity="0.45"/>

  <!-- Green WhatsApp-style Chat Bubble (top right of card area) -->
  <g transform="translate(148, 96)" filter="url(#chatShadow)">
    <!-- Bubble body -->
    <rect x="0" y="0" width="58" height="36" rx="10" fill="url(#greenChat)"/>
    <!-- Bubble tail -->
    <path d="M8 36 L0 46 L18 36 Z" fill="#059669"/>
    <!-- Chat lines inside bubble -->
    <rect x="8"  y="9"  width="30" height="4" rx="2" fill="#FFFFFF" opacity="0.9"/>
    <rect x="8"  y="17" width="22" height="4" rx="2" fill="#FFFFFF" opacity="0.7"/>
    <rect x="8"  y="25" width="26" height="4" rx="2" fill="#FFFFFF" opacity="0.55"/>
    <!-- Chat tick marks -->
    <path d="M44 27 L47 30 L54 22" fill="none" stroke="#FFFFFF"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          opacity="0.85"/>
  </g>

  <!-- Central Screen & Barcode -->
  <rect x="30" y="100" width="155" height="62" rx="8"
        fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <!-- Barcode bars -->
  <rect x="44"  y="110" width="5"  height="42" rx="1" fill="#334155"/>
  <rect x="52"  y="110" width="9"  height="42" rx="1" fill="#334155"/>
  <rect x="64"  y="110" width="4"  height="42" rx="1" fill="#334155"/>
  <rect x="71"  y="110" width="11" height="42" rx="1" fill="#334155"/>
  <rect x="85"  y="110" width="5"  height="42" rx="1" fill="#334155"/>
  <rect x="93"  y="110" width="8"  height="42" rx="1" fill="#334155"/>
  <rect x="104" y="110" width="3"  height="42" rx="1" fill="#334155"/>
  <rect x="110" y="110" width="7"  height="42" rx="1" fill="#334155"/>
  <rect x="120" y="110" width="4"  height="42" rx="1" fill="#334155"/>
  <rect x="127" y="110" width="9"  height="42" rx="1" fill="#334155"/>
  <rect x="139" y="110" width="5"  height="42" rx="1" fill="#334155"/>
  <rect x="147" y="110" width="7"  height="42" rx="1" fill="#334155"/>
  <rect x="157" y="110" width="4"  height="42" rx="1" fill="#334155"/>
  <!-- Barcode number -->
  <text x="100" y="160" font-family="monospace" font-size="6"
        fill="#64748B" text-anchor="middle">Z-2024-00847</text>

  <!-- Red Scanner Laser with glow -->
  <line x1="35" y1="131" x2="180" y2="131" stroke="#EF4444"
        stroke-width="2.5" stroke-linecap="round"
        filter="url(#glow)" opacity="0.8"/>

  <!-- Cart Base & Wheels -->
  <path d="M 30 168 h 108 l -16 26 h -76 z"
        fill="#94A3B8" opacity="0.15"/>
  <circle cx="60"  cy="184" r="9" fill="#334155"/>
  <circle cx="60"  cy="184" r="4" fill="#FFFFFF"/>
  <circle cx="118" cy="184" r="9" fill="#334155"/>
  <circle cx="118" cy="184" r="4" fill="#FFFFFF"/>

  <!-- ── ENLARGED Payment Card ── -->
  <g filter="url(#cardShadow)">
    <rect x="95" y="128" width="118" height="78" rx="14"
          fill="url(#goldGrad)" stroke="#FFFFFF" stroke-width="4"/>

    <!-- Card shine -->
    <ellipse cx="130" cy="142" rx="28" ry="11"
             fill="#FFFFFF" opacity="0.2"/>

    <!-- EMV Chip -->
    <rect x="106" y="140" width="22" height="16" rx="4" fill="#D97706"/>
    <line x1="106" y1="148" x2="128" y2="148" stroke="#92400E" stroke-width="1"/>
    <line x1="117" y1="140" x2="117" y2="156" stroke="#92400E" stroke-width="1"/>
    <rect x="109" y="142" width="7"  height="5" rx="1" fill="#92400E" opacity="0.5"/>
    <rect x="119" y="142" width="7"  height="5" rx="1" fill="#92400E" opacity="0.5"/>

    <!-- Contactless rings -->
    <g fill="none" stroke="#92400E" stroke-linecap="round" opacity="0.55">
      <path d="M134 142 Q140 136 140 130" stroke-width="2"/>
      <path d="M134 145 Q143 136 143 126" stroke-width="2"/>
      <path d="M134 148 Q146 136 146 122" stroke-width="2"/>
    </g>

    <!-- Bold Z on card -->
    <path d="M 154 142 h 36 l -36 32 h 36"
          fill="none" stroke="#7C2D12"
          stroke-width="5.5" stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Card number -->
    <text x="108" y="174" font-family="monospace" font-size="7.5"
          fill="#7C2D12" letter-spacing="1.5" opacity="0.85">
      4716  ••••  ••••  3291
    </text>

    <!-- Cardholder name -->
    <text x="108" y="185" font-family="Arial" font-size="6.5"
          fill="#92400E" letter-spacing="1" opacity="0.8">
      ZARA PREMIUM USER
    </text>

    <!-- Expiry -->
    <text x="108" y="196" font-family="monospace" font-size="6"
          fill="#92400E" opacity="0.75">EXP 09/28</text>

    <!-- CVV label -->
    <text x="190" y="196" font-family="monospace" font-size="6"
          fill="#92400E" opacity="0.75" text-anchor="end">CVV 742</text>

    <!-- Mastercard style rings bottom-right -->
    <circle cx="196" cy="144" r="11" fill="#EF4444" opacity="0.35"/>
    <circle cx="183" cy="144" r="11" fill="#FBBF24" opacity="0.5"/>
  </g>
</svg>