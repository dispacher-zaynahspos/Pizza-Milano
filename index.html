<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/logo.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#10b981" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ZaynahsPOS">
    <title>Zaynahs POS</title>
    <meta name="description" content="Zaynahs POS - A modern point of sale system" />
    <meta name="robots" content="index, follow" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    
    <meta property="og:title" content="ZaynahsPos" />
    <meta property="og:description" content="A modern point of sale system for retail and e-commerce." />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:url" content="https://zaynahspos.com" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ZaynahsPos" />
    <meta name="twitter:description" content="A modern point of sale system for retail and e-commerce." />
    <meta name="twitter:image" content="/logo.png" />
    <meta name="twitter:site" content="@zaynahs_pos" />
    <meta name="twitter:creator" content="@iamchandira" />
    <script>
      // Apply theme immediately to prevent flashing
      var _theme = localStorage.getItem('theme') || 'dark'; // Always default to dark
      var _isDark = _theme !== 'light';

      // ─── Apply background color IMMEDIATELY (before CSS loads) ───
      // This is the root cause fix for iOS PWA black screen on launch/refresh.
      // We must set the background on both html AND body inline so the browser
      // paints the correct color before any stylesheet or JS executes.
      var _bgColor = _isDark ? '#0a0a0a' : '#ffffff';
      var _textColor = _isDark ? '#f3f4f6' : '#111827';
      document.documentElement.style.backgroundColor = _bgColor;
      document.documentElement.style.color = _textColor;
      document.documentElement.style.colorScheme = _isDark ? 'dark' : 'light';

      if (_isDark) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }

      // ─── Sync PWA status bar color ───
      // Must happen synchronously before DOMContentLoaded on iOS.
      var _metaThemeColor = document.querySelector('meta[name="theme-color"]');
      if (_metaThemeColor) {
        _metaThemeColor.setAttribute('content', _isDark ? '#0a0a0a' : '#ffffff');
      }
      var _appleStatus = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
      if (_appleStatus) {
        _appleStatus.setAttribute('content', _isDark ? 'black-translucent' : 'default');
      }

      // Also apply to body once available (covers PWA splash to first paint gap)
      document.addEventListener('DOMContentLoaded', function() {
        document.body.style.backgroundColor = _bgColor;
        document.body.style.color = _textColor;
      });

      // Unregister any active service worker in local development mode to prevent cached stale builds
      if (
        location.hostname === 'localhost' || 
        location.hostname === '127.0.0.1' || 
        location.hostname.startsWith('192.168.') || 
        location.hostname.startsWith('10.') || 
        location.port !== ''
      ) {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for (var i = 0; i < registrations.length; i++) {
              registrations[i].unregister().then(function(success) {
                if (success) {
                  console.log('[DEV] Unregistered stale service worker');
                }
              });
            }
          });
        }
      }

      // ─── Dynamic PWA Manifest per Tenant (reads business name + logo from cached settings) ───
      (function() {
        var _settings = {};
        try { _settings = JSON.parse(localStorage.getItem('pos_settings') || '{}'); } catch(e) {}
        
        // Correct keys: settings mapped to localStorage are stored in camelCase
        var _bizName = _settings.storeName || 'Zaynahs';
        var _storeLogo = _settings.storeLogo || '';
        var _themeColor = _settings.estoreThemeColor || '#10b981';
        var _isStore = window.location.pathname.startsWith('/store');

        function _generateManifest(name, shortName, desc, startUrl, scope, bgColor, icons) {
          return {
            name: name,
            short_name: shortName,
            description: desc,
            theme_color: _themeColor,
            background_color: bgColor,
            display: 'standalone',
            orientation: _isStore ? 'portrait' : 'any',
            start_url: startUrl,
            scope: scope,
            categories: _isStore ? ['shopping', 'food', 'lifestyle'] : ['business', 'finance', 'productivity'],
            icons: icons
          };
        }

        var _icons = [
          { src: '/android-chrome-192x192.png', sizes: '192x192', type: 'image/png' },
          { src: '/android-chrome-512x512.png', sizes: '512x512', type: 'image/png' },
          { src: '/android-chrome-512x512.png', sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
        ];

        // Store PWA uses custom uploaded logo. POS PWA retains default Zaynahs icons for clear differentiation.
        if (_isStore && _storeLogo) {
          _icons = [
            { src: _storeLogo, sizes: '512x512', type: 'image/png', purpose: 'any' },
            { src: _storeLogo, sizes: '192x192', type: 'image/png', purpose: 'any' }
          ];
          
          // Dynamically set Apple Touch Icon for iOS home screen installation
          var _appleIcon = document.querySelector('link[rel="apple-touch-icon"]');
          if (_appleIcon) {
            _appleIcon.setAttribute('href', _storeLogo);
          }

          // Dynamically set standard favicon tab icons to store logo
          var _favicons = document.querySelectorAll('link[rel*="icon"]');
          for (var _i = 0; _i < _favicons.length; _i++) {
            _favicons[_i].setAttribute('href', _storeLogo);
          }
        }

        var _manifest;
        if (_isStore) {
          _manifest = _generateManifest(
            _bizName,
            _bizName.length > 12 ? _bizName.substring(0, 12) : _bizName,
            'Order online from ' + _bizName,
            '/store', '/store',
            '#f9fafb',
            _icons
          );
          document.title = _bizName + ' - Online Store';
        } else {
          _manifest = _generateManifest(
            _bizName + ' POS',
            (_bizName + ' POS').substring(0, 12),
            'Point-of-sale system for ' + _bizName,
            '/pos', '/',
            '#0a0a0a',
            _icons
          );
          document.title = _bizName + ' POS';
        }

        var _manifestLink = document.querySelector('link[rel="manifest"]');
        var _blob = new Blob([JSON.stringify(_manifest)], { type: 'application/json' });
        var _url = URL.createObjectURL(_blob);
        if (_manifestLink) {
          _manifestLink.setAttribute('href', _url);
        } else {
          var _newLink = document.createElement('link');
          _newLink.rel = 'manifest';
          _newLink.href = _url;
          document.head.appendChild(_newLink);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.tsx"></script>
  </body>
</html>
